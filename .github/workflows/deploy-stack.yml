name: Deploy Deployment Stack

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/deploy-stack.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to (dev, staging, prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP_NAME: ${{ secrets.RESOURCE_GROUP_NAME }}
  DEPLOYMENT_STACK_NAME: "stack-dev"
  ENVIRONMENT: "dev"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Validate resource group exists
        run: |
          if az group exists --name "${{ env.RESOURCE_GROUP_NAME }}" | grep -q true; then
            echo "✓ Resource group '${{ env.RESOURCE_GROUP_NAME }}' found"
          else
            echo "✗ Resource group '${{ env.RESOURCE_GROUP_NAME }}' not found"
            exit 1
          fi

      - name: Validate Bicep template
        run: |
          az bicep build --file infra/main.bicep --outdir /tmp
          echo "✓ Bicep syntax validation successful"

      - name: Create or update deployment stack
        id: deploy
        uses: Azure/bicep-deploy@v2
        with:
          name: ${{ env.DEPLOYMENT_STACK_NAME }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ env.RESOURCE_GROUP_NAME }}
          template-file: ./infra/main.bicep
          parameters-file: ./infra/main.bicepparam
          type: deploymentStack
          scope: resourceGroup
          operation: create
          action-on-unmanage-resources: delete
          deny-settings-mode: none

      - name: Get deployment outputs
        id: outputs
        run: |
          echo "## 📦 Deployment Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          OUTPUTS=$(az stack group show \
            --name "${{ env.DEPLOYMENT_STACK_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --query outputs)

          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deployment success summary
        run: |
          echo "## ✓ Deployment Stack Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ env.RESOURCE_GROUP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Name:** ${{ env.DEPLOYMENT_STACK_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Stack Name:** ${{ env.DEPLOYMENT_STACK_NAME }}" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build Function
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: .NET SDK Setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: .NET Publish Function App
        run: |
          dotnet publish ./src/func.csproj -c Release -o ./publish

      # Save publish artifacts for the next job
      - name: Upload publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: function-publish
          path: ./publish

  publish:
    name: Publish Function App
    runs-on: ubuntu-latest
    needs: [ deploy, build ]
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v8
        with:
          name: function-publish

      - name: List files
        run: ls -alR

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Publish
        uses: azure/functions-action@v1
        with:
          app-name: "func-openapi-australiaeast" # ${{ steps.deploy.outputs.functionAppName }}
          package: .
